<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidade Messiânica Universal</title>
  <meta name="description" content="Portal digital da Comunidade Messiânica Universal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap">
  <link rel="stylesheet" href="css/landing.css?v=4">
</head>

<body>

  <div class="hero">
    <!-- Emblema CMU — SVG inline -->
    <a href="guia_do_johrei" class="logo-wrap" aria-label="Guia do Johrei">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
        aria-label="Emblema da Comunidade Messiânica Universal">
        <!-- Borda dourada + fundo branco -->
        <circle cx="100" cy="100" r="98" fill="#b8860b" />
        <circle cx="100" cy="100" r="92" fill="#ffffff" />
        <!-- Cruz verde -->
        <rect x="80" y="8" width="40" height="184" fill="#006400" />
        <rect x="8" y="80" width="184" height="40" fill="#006400" />
        <!-- Anel vermelho -->
        <circle cx="100" cy="100" r="42" fill="#cc0000" />
        <!-- Disco dourado central -->
        <circle cx="100" cy="100" r="28" fill="#b8860b" />
      </svg>
    </a>

    <h1 class="org-name">Comunidade Messiânica Universal</h1>
  </div>

  <main class="landing">
    <section class="poema-calendario" aria-label="Calendário e poesia do mês">
      <div id="calendario" class="calendario" aria-live="polite"></div>
      <aside id="poema-painel" class="poema-painel" aria-label="Poema de Yama to Mizu"></aside>
    </section>

    <section id="comunicados-painel" class="comunicados-painel" hidden aria-label="Comunicados"></section>

    <section id="acesso-painel" class="acesso-painel" hidden aria-label="Dados de acesso"></section>
  </main>

  <footer>
    <div class="divider"></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/yamatomizu-data.js"></script>
  <script src="js/landing.js?v=2" defer></script>

</body>

</html>
